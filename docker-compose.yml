services:
  apigateway:
    build: .
    container_name: apigateway
    env_file:
      - ./.env
    ports:
      - "8085:8085"
    depends_on:
      - authservice
      - userservice
      - orderservice
      - paymentservice
    networks:
      - app-network

  authservice:
    build: ../innowise-authService
    container_name: authservice
    env_file:
      - ../innowise-authService/.env
    environment:
      DB_HOST_DOCKER: authservice-postgres
      DB_PORT: ${AUTH_DB_PORT}
      DB_NAME: ${AUTH_DB_NAME}
      DB_USERNAME: ${AUTH_DB_USERNAME}
      DB_PASSWORD: ${AUTH_DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SERVICES_INTERNAL_SECRET: ${SERVICES_INTERNAL_SECRET}
      SPRING_PROFILES_ACTIVE: docker
      LOGGING_LEVEL_LIQUIBASE: INFO
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_BOOT_AUTOCONFIGURE_LIQUIBASE: DEBUG
      USERSERVICE_BASE_URL: http://userservice:8080
    depends_on:
      authservice-postgres:
        condition: service_healthy
    networks:
      - app-network

  authservice-postgres:
    image: postgres:16
    container_name: authservice-postgres
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME}
      POSTGRES_USER: ${AUTH_DB_USERNAME}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
    ports:
      - "5435:5432"
    volumes:
      - authservice_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  userservice:
    build: ../innowise-userService
    container_name: userservice
    env_file:
      - ../innowise-userService/.env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SPRING_DATASOURCE_URL: ${USER_SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${USER_SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${USER_SPRING_DATASOURCE_PASSWORD}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: ${USER_SPRING_DATASOURCE_DRIVER_CLASS_NAME}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      SERVICES_INTERNAL_SECRET: ${SERVICES_INTERNAL_SECRET}
      GATEWAY_INTERNAL_SIGNING_SECRET: ${GATEWAY_INTERNAL_SIGNING_SECRET}
    depends_on:
      userservice-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  userservice-postgres:
    image: postgres:15-alpine
    container_name: userservice-postgres
    environment:
      POSTGRES_DB: ${USER_DB_NAME}
      POSTGRES_USER: ${USER_DB_USERNAME}
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - userservice_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: userservice-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - app-network

  orderservice:
    build: ../innowise-orderService
    container_name: orderservice
    env_file:
      - ../innowise-orderService/.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://orderservice-postgres:5432/${ORDER_DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${ORDER_DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${ORDER_DB_PASSWORD}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: ${ORDER_SPRING_DATASOURCE_DRIVER_CLASS_NAME}
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: ${JWT_SECRET}
      USERSERVICE_BASE_URL: http://userservice:8080
      AUTHSERVICE_BASE_URL: http://authservice:8082
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PAYMENT_CREATED_TOPIC: ${PAYMENT_CREATED_TOPIC:-create-payment}
    depends_on:
      orderservice-postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - app-network

  orderservice-postgres:
    image: postgres:16-alpine
    container_name: orderservice-postgres
    environment:
      POSTGRES_DB: ${ORDER_DB_NAME}
      POSTGRES_USER: ${ORDER_DB_USERNAME}
      POSTGRES_PASSWORD: ${ORDER_DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - orderservice_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  paymentservice:
    build: ../innowise-paymentservice
    container_name: paymentservice
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATA_MONGODB_URI: mongodb://paymentservice-mongodb:27017/paymentservice
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET}
      GATEWAY_INTERNAL_SIGNING_SECRET: ${GATEWAY_INTERNAL_SIGNING_SECRET}
      ORDERSERVICE_BASE_URL: http://orderservice:8080
      PAYMENT_CREATED_TOPIC: ${PAYMENT_CREATED_TOPIC:-create-payment}
      RANDOM_API_URL: ${RANDOM_API_URL:-https://www.randomnumberapi.com/api/v1.0/random}
    depends_on:
      paymentservice-mongodb:
        condition: service_started
      kafka:
        condition: service_started
    networks:
      - app-network

  paymentservice-mongodb:
    image: mongo:7.0
    container_name: paymentservice-mongodb
    ports:
      - "27017:27017"
    volumes:
      - paymentservice_mongodb_data:/data/db
    networks:
      - app-network

  kafka:
    image: bitnami/kafka:3.7
    container_name: app-kafka
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_KRAFT_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9092:9092"
    networks:
      - app-network

volumes:
  authservice_pgdata:
  userservice_pgdata:
  orderservice_pgdata:
  paymentservice_mongodb_data:

networks:
  app-network:
    driver: bridge
